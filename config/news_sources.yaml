# Реестр всех новостных источников (37 шт).
#
# Поля:
#   weight ∈ [0..1]        — базовый вес источника
#   category               — dataset | ai_analytics | terminal | rss | tg | api | regulator | broker
#   requires_key           — нужен ли API-ключ (хранится в .env)
#   env_key                — имя переменной окружения с ключом
#   ru_specialized         — фокусируется на РФ-рынке
#   trump_priority         — часто публикует слова Трампа первым
#   trust_tier             — verified | trusted | corporate | analytical | community |
#                            broker | regulator | educational | aggregator | anonymous
#   regulator_triggers     — список ключевых слов, при которых ставим
#                            regulator_event=True (циркуит-брейкер)

