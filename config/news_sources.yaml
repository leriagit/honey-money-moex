# ─────────────────────────── Глобальные настройки ────────────────────

aggregator:
  ru_relevance_boost: 1.5
  trump_boost: 1.3
  window_hours: 24
  min_confidence: 0.20
  enable_ru_defense_signal: true

  # Trust-tier multipliers (применяется поверх weight)
  trust_multipliers:
    regulator:   1.20    # ЦБ, Кремль — поднимаем ещё
    verified:    1.10    # Bloomberg, Reuters, WSJ, FT, NYT — крутые
    trusted:     1.05    # The Bell, MarketTwits, KБ.Экономика
    broker:      1.00    # SberCIB, Альфа, BCS — нормально
    corporate:   1.00    # ДОХОДЪ
    analytical:  0.95    # Invest Era, datasets
    community:   0.90    # Смартлаб — мнения
    educational: 0.85    # Простая экономика — не сигналы
    aggregator:  0.80    # Дивиденды Онлайн — без анализа
    anonymous:   0.60    # Кот.Финанс — возможная аффилированность

# RU-counter источники для ru_defense_flag (добавили rbc, finam, smartlab)
ru_counter_sources:
  - rbc
  - finam
  - interfax        # ещё нет парсера, но в логике учитываем
  - kommersant      # ещё нет парсера
  - vedomosti       # ещё нет парсера
  - smartlab
